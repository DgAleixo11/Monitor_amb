<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3">
  <title>MONITOR DE CHAMADA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div>
      <img class="logo-img" src="logo.png" alt="Logo do Hospital">
    </div>

    <div class="titulo-topo">Ambulatório</div>

    <div class="relogio" id="relogio">--:--</div>
  </header>

  <main>
    <section class="chamada-atual">
      <div class="label">PACIENTE CHAMADO</div>

      <div class="paciente">
        <!--PACIENTE_ATUAL-->
        Aguardando Chamada
        <!--FIM_PACIENTE_ATUAL-->
      </div>

      <div class="orientacao">
        <!--DESTINO_CHAMADA-->
        Favor aguardar chamada
        <!--FIM_DESTINO_CHAMADA-->
      </div>

      <div class="hora">
        <!--HORA_CHAMADA-->
        -
        <!--FIM_HORA_CHAMADA-->
      </div>
    </section>

    <section class="ultimos">
      <div class="titulo-ultimos">ÚLTIMOS CHAMADOS</div>

      <!--ULTIMOS_CHAMADOS-->
      <div class="linha-ultimo">Nenhum chamado anterior</div>
      <!--FIM_ULTIMOS_CHAMADOS-->
    </section>
  </main>

  <div id="id-chamada" style="display:none;">
    <!--ID_CHAMADA-->
    0
    <!--FIM_ID_CHAMADA-->
  </div>

  <script src="script.js"></script>
</body>
</html>
