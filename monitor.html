<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3">
  <title>MONITOR DE CHAMADA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: white;
      color: #111;
    }

    header {
      height: 105px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 45px;
      border-bottom: 4px solid #0057b8;
    }

    .logo-img {
      max-width: 190px;
      max-height: 85px;
      object-fit: contain;
    }

    .titulo-topo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 44px;
      font-weight: bold;
      color: #0057b8;
    }

    .relogio {
      margin-left: auto;
      font-size: 36px;
      font-weight: bold;
      color: #0057b8;
    }

    main {
      padding: 35px 45px;
    }

    .chamada-atual {
      background: #eef4ff;
      border-radius: 24px;
      padding: 35px 45px;
      border: 3px solid #0057b8;
    }

    .label {
      font-size: 30px;
      color: #0057b8;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .paciente {
      font-size: 80px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 25px;
    }

    .orientacao {
      background: #0057b8;
      color: white;
      font-size: 38px;
      font-weight: bold;
      padding: 22px;
      border-radius: 18px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .hora {
      text-align: center;
      font-size: 26px;
      margin-top: 22px;
      color: #333;
    }

    .ultimos {
      margin-top: 25px;
    }

    .titulo-ultimos {
      font-size: 28px;
      color: #0057b8;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .linha-ultimo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f1f1f1;
      border-radius: 12px;
      padding: 14px 24px;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <header>
    <div>
      <img class="logo-img" src="logo.png" alt="Logo do Hospital">
    </div>

    <div class="titulo-topo">
      Ambulatório
    </div>

    <div class="relogio">
      <!--HORA_ATUAL-->
      --:--
      <!--FIM_HORA_ATUAL-->
    </div>
  </header>

  <main>
    <section class="chamada-atual">
      <div class="label">PACIENTE CHAMADO</div>

      <div class="paciente">
        <!--PACIENTE_ATUAL-->
CLAUDIO C. G. OLIVEIRA
<!--FIM_PACIENTE_ATUAL-->
      </div>

      <div class="orientacao">
  <!--DESTINO_CHAMADA-->
  Favor comparecer ao destino
  <!--FIM_DESTINO_CHAMADA-->
</div>

      <div class="hora">
        <!--HORA_CHAMADA-->
Chamado �s 17:05
<!--FIM_HORA_CHAMADA-->
      </div>
    </section>

    <section class="ultimos">
      <div class="titulo-ultimos">ÚLTIMOS CHAMADOS</div>

      <!--ULTIMOS_CHAMADOS-->
<div class='linha-ultimo'><span>CLAUDIO C. G. OLIVEIRA</span><span>0,711805555555555</span></div>
<div class='linha-ultimo'><span>LUIZ C. P. SILVA</span><span>0,710416666666667</span></div>

<!--FIM_ULTIMOS_CHAMADOS-->
    </section>
  </main>

  <div id="id-chamada" style="display:none;">
    <!--ID_CHAMADA-->
20260508170536
<!--FIM_ID_CHAMADA-->
  </div>

</body>
</html>
